<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Fight - Enhanced Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Cinzel',serif; user-select:none; }
#gc { position:relative; width:100vw; height:100vh; }
canvas { position:absolute; top:0; left:0; display:block; }

.screen {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:10; transition:opacity 0.5s;
}
.screen.hidden { opacity:0; pointer-events:none; }

#menuScreen { background:radial-gradient(ellipse at center,#1a0800 0%,#000 70%); }

.gtitle {
  font-family:'Cinzel Decorative',serif; font-size:clamp(2rem,6vw,5rem); font-weight:900;
  color:transparent; background:linear-gradient(180deg,#fff5e0 0%,#ff9900 40%,#cc3300 100%);
  -webkit-background-clip:text; background-clip:text;
  filter:drop-shadow(0 0 30px #ff6600aa);
  letter-spacing:0.1em; text-align:center; line-height:1.1;
}

.mbtn {
  background:linear-gradient(135deg,#1a0800,#3d1500); border:1px solid #ff6600;
  color:#ffcc88; font-family:'Cinzel',serif; font-size:clamp(0.75rem,1.8vw,1rem);
  letter-spacing:0.2em; padding:0.75em 2.5em; cursor:pointer; margin:0.35rem;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  transition:all 0.2s; text-transform:uppercase; width:clamp(170px,28vw,260px); text-align:center;
}
.mbtn:hover { color:#fff; border-color:#ffaa44; box-shadow:0 0 20px #ff660055; }

.coins {
  position:absolute; top:20px; right:20px; color:#ffdd00; font-size:1.5rem;
  text-shadow:0 0 10px #ffaa00; z-index:100;
}
</style>
</head>
<body>
<div id="gc">
  <canvas id="c"></canvas>
  <div class="coins">💰 <span id="coinCount">0</span></div>
  
  <div class="screen" id="menuScreen">
    <div class="gtitle">Shadow Fight</div>
    <button class="mbtn" onclick="showCharacterSelect()">PLAY</button>
    <button class="mbtn" onclick="showShop()">SHOP</button>
    <button class="mbtn" onclick="showAchievements()">ACHIEVEMENTS</button>
  </div>
</div>

</body>
</html>
